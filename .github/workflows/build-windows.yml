name: Build Windows Portable Zip

on:
  push:
    branches: [main, master]
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'
          channel: 'stable'

      - name: Install dependencies
        run: |
          flutter pub get
          cd packages/video_engine
          flutter pub get
          cd ../..

      - name: Download FFmpeg shared DLLs
        shell: pwsh
        run: |
          # 使用 BtbN 的 FFmpeg master 构建 (含 NVENC)
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg-temp -Force
          # 创建目标目录
          New-Item -ItemType Directory -Force ffmpeg-bin
          # 查找 bin 目录并复制 DLL
          $binDir = Get-ChildItem ffmpeg-temp -Recurse -Directory | Where-Object { $_.Name -eq "bin" } | Select-Object -First 1
          if ($binDir) {
            Copy-Item "$($binDir.FullName)/*.dll" -Destination ffmpeg-bin/ -Force
          } else {
            # fallback: 直接搜索 DLL
            Get-ChildItem ffmpeg-temp -Recurse -Filter "*.dll" | ForEach-Object { Copy-Item $_.FullName -Destination ffmpeg-bin/ -Force }
          }
          Write-Host "FFmpeg DLLs ready:"
          Get-ChildItem ffmpeg-bin/

      - name: Build Flutter Windows
        run: flutter build windows --release

      - name: Copy FFmpeg DLLs to build output
        shell: pwsh
        run: |
          # 找到实际的 Release 输出目录
          $releaseDir = Get-ChildItem build/windows -Recurse -Directory | Where-Object { $_.Name -eq "Release" } | Select-Object -First 1
          if (-not $releaseDir) {
            Write-Host "Searching for build output..."
            Get-ChildItem build/windows -Recurse -Directory | ForEach-Object { Write-Host $_.FullName }
            $releaseDir = Get-ChildItem build/windows -Recurse -Directory | Where-Object { $_.Name -eq "Release" } | Select-Object -First 1
          }
          Write-Host "Release dir: $($releaseDir.FullName)"
          Copy-Item ffmpeg-bin/*.dll -Destination $releaseDir.FullName -Force
          Write-Host "Build output:"
          Get-ChildItem $releaseDir.FullName

      - name: Package Zip
        shell: pwsh
        run: |
          $releaseDir = Get-ChildItem build/windows -Recurse -Directory | Where-Object { $_.Name -eq "Release" } | Select-Object -First 1
          $version = (Get-Date -Format "yyyyMMdd-HHmm")
          $zipName = "cauncut-windows-x64-$version.zip"
          Compress-Archive `
            -Path "$($releaseDir.FullName)/*" `
            -DestinationPath $zipName `
            -Force
          Write-Host "Zip created: $zipName ($((Get-Item $zipName).Length) bytes)"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cauncut-windows-portable
          path: cauncut-windows-x64-*.zip
          retention-days: 7
